<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loom Design System</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A0A0F;
      color: #E7E7E7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #2C66DD, #5685E4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 18px;
      color: #9C9C9D;
      margin-bottom: 48px;
      line-height: 1.5;
    }
    .cta-button {
      display: inline-block;
      padding: 16px 40px;
      background: #2C66DD;
      color: #FFFFFF;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .cta-button:hover {
      background: #225CCF;
      transform: translateY(-1px);
    }
    .cta-button:active {
      background: #1E52BB;
      transform: translateY(0);
    }
    .footer {
      margin-top: 64px;
      font-size: 13px;
      color: #6A6B6C;
    }
    .footer a {
      color: #5685E4;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Loom</div>
    <p class="tagline">The unified design system for Zoho products.<br>Built on DSG standards.</p>
    <a href="catalog.html" class="cta-button">Designer, Click Here</a>
    <p class="footer">
      Maintained by Zoho Writer Design Team &middot;
      <a href="https://github.com/kamalakannan-raju-2916/loom-ds">GitHub Repo</a>
    </p>
  </div>
</body>
</html>
