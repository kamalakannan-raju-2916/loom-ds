<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: var(--figma-color-text, #333);
    background: var(--figma-color-bg, #fff);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .header {
    background: #1a1a1a;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .header .sep { color: #555; font-weight: 300; font-size: 18px; }
  .header .subtitle { font-size: 12px; color: #999; font-weight: 400; }

  .body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  label {
    font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--figma-color-text-secondary, #666);
  }

  select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--figma-color-border, #ddd);
    border-radius: 6px; font-size: 13px;
    background: var(--figma-color-bg, #fff);
    color: var(--figma-color-text, #333);
    cursor: pointer; outline: none;
  }
  select:focus { border-color: #2C66DD; }

  .product-card { display: none; border: 1px solid var(--figma-color-border, #e0e0e0); border-radius: 8px; overflow: hidden; }
  .product-card.visible { display: block; }
  .accent-bar { height: 6px; }
  .product-info { padding: 16px; }
  .product-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .product-desc { font-size: 12px; color: var(--figma-color-text-secondary, #888); margin-bottom: 12px; }

  .what-gets-created {
    background: var(--figma-color-bg-secondary, #f8f8f8);
    border-radius: 6px;
    padding: 12px;
  }
  .what-gets-created h4 {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--figma-color-text-secondary, #888);
    margin-bottom: 8px;
  }

  .section-group { margin-bottom: 10px; }
  .section-group-title {
    font-size: 11px; font-weight: 600;
    color: var(--figma-color-text-secondary, #888);
    margin-bottom: 4px;
  }
  .token-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .token-chip {
    background: var(--figma-color-bg, #fff);
    border: 1px solid var(--figma-color-border, #e0e0e0);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    display: flex; align-items: center; gap: 4px;
  }
  .token-chip .count { font-weight: 700; color: #2C66DD; }

  .pages-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .page-chip {
    background: #EAF0FC;
    border: 1px solid #C0D1F5;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    color: #2C66DD;
    font-weight: 500;
  }

  .status-area {
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-size: 12px;
    color: var(--figma-color-text-secondary, #888);
    padding: 0 20px;
  }
  .status-area.error { color: #CC3929; }
  .status-area.success { color: #0C8844; font-weight: 600; }

  .footer {
    padding: 12px 20px;
    display: flex; gap: 10px;
  }
  button {
    flex: 1; padding: 10px 0;
    border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #2C66DD; color: #fff; }
  .btn-secondary {
    background: var(--figma-color-bg-secondary, #f0f0f0);
    color: var(--figma-color-text, #333);
    flex: 0 0 auto; padding: 10px 16px;
  }

  .vulcan-footer {
    text-align: center; padding: 6px 0 10px;
    color: #bbb; font-size: 11px; line-height: 1.6;
  }
  .vulcan-footer .emoji { font-size: 16px; }
</style>
</head>
<body>

  <div class="header">
    <span class="logo">Loom</span>
    <span class="sep">|</span>
    <span class="subtitle">Design Tokens</span>
  </div>

  <div class="body">
    <div>
      <label for="product-select">Choose Product</label>
      <select id="product-select">
        <option value="">Select a product…</option>
      </select>
    </div>

    <div class="product-card" id="product-card">
      <div class="accent-bar" id="accent-bar"></div>
      <div class="product-info">
        <div class="product-name" id="product-name"></div>
        <div class="product-desc" id="product-desc"></div>

        <div class="what-gets-created">
          <h4>What gets created</h4>

          <div class="section-group">
            <div class="section-group-title">Variable Collections</div>
            <div class="token-list" id="collections-list"></div>
          </div>

          <div class="section-group">
            <div class="section-group-title">Pages</div>
            <div class="pages-list">
              <span class="page-chip">Primitives</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-area" id="status">Choose a product to begin</div>

  <div class="footer">
    <button class="btn-secondary" id="btn-cancel" onclick="parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*')">Close</button>
    <button class="btn-primary" id="btn-sync" disabled>Sync to Figma</button>
  </div>

  <div class="vulcan-footer">
    <span class="emoji">🖖</span><br>
    Live long and Prosper
  </div>

<script>
  var REPO_BASE = 'https://raw.githubusercontent.com/kamalakannan-raju-2916/loom-ds/main/tokens';

  var productsRegistry = null;
  var selectedProduct = null;
  var cachedColors = null;

  var select = document.getElementById('product-select');
  var card = document.getElementById('product-card');
  var btnSync = document.getElementById('btn-sync');
  var statusEl = document.getElementById('status');

  function fetchJSON(path) {
    var url = REPO_BASE + '/' + path;
    return fetch(url, { cache: 'no-store' }).then(function(res) {
      if (!res.ok) throw new Error('Failed to fetch ' + path + ': ' + res.status);
      return res.json();
    });
  }

  function countColorVars(colorsData, families) {
    var count = 0;
    for (var i = 0; i < families.length; i++) {
      var family = colorsData.primitive.color[families[i]];
      if (!family) continue;
      var keys = Object.keys(family);
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        if (family[key] && family[key].$value) count++;
      }
    }
    // Add essentials (9)
    count += 9;
    return count;
  }

  function renderCollectionChips(product) {
    var list = document.getElementById('collections-list');
    list.innerHTML = '';
    var collections = [
      { name: 'Primitives', count: countColorVars(cachedColors, product.colorFamilies) }
    ];
    for (var i = 0; i < collections.length; i++) {
      var chip = document.createElement('span');
      chip.className = 'token-chip';
      chip.innerHTML = collections[i].name + ' <span class="count">' + collections[i].count + '</span>';
      list.appendChild(chip);
    }
  }

  function init() {
    statusEl.textContent = 'Loading tokens from GitHub…';
    Promise.all([
      fetchJSON('products.json'),
      fetchJSON('primitive/colors.json')
    ]).then(function(results) {
      productsRegistry = results[0];
      cachedColors = results[1];

      var productKeys = Object.keys(productsRegistry.products);
      for (var i = 0; i < productKeys.length; i++) {
        var key = productKeys[i];
        var prod = productsRegistry.products[key];
        var opt = document.createElement('option');
        opt.value = key;
        opt.textContent = prod.name;
        select.appendChild(opt);
      }
      statusEl.textContent = 'Choose a product to begin';
      statusEl.className = 'status-area';
    }).catch(function(err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'status-area error';
    });
  }

  select.addEventListener('change', function() {
    var key = select.value;
    if (!key || !productsRegistry) {
      card.className = 'product-card';
      btnSync.disabled = true;
      selectedProduct = null;
      statusEl.textContent = 'Choose a product to begin';
      statusEl.className = 'status-area';
      return;
    }

    selectedProduct = productsRegistry.products[key];
    selectedProduct.key = key;
    var accentFamily = cachedColors.primitive.color[selectedProduct.accent];
    var accentHex = (accentFamily && accentFamily.base && accentFamily.base.$value) || '#666';

    document.getElementById('accent-bar').style.background = accentHex;
    document.getElementById('product-name').textContent = selectedProduct.name;
    document.getElementById('product-desc').textContent = selectedProduct.description + ' · Accent: ' + selectedProduct.accent;

    renderCollectionChips(selectedProduct);

    card.className = 'product-card visible';
    btnSync.disabled = false;
    statusEl.textContent = 'Ready to sync';
    statusEl.className = 'status-area';
  });

  btnSync.addEventListener('click', function() {
    if (!selectedProduct || !cachedColors) return;

    btnSync.disabled = true;
    select.disabled = true;
    statusEl.textContent = 'Syncing…';
    statusEl.className = 'status-area';

    parent.postMessage({
      pluginMessage: {
        type: 'sync-tokens',
        productConfig: selectedProduct,
        colorsData: cachedColors
      }
    }, '*');
  });

  window.onmessage = function(event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      statusEl.textContent = msg.message;
      statusEl.className = 'status-area';
    }

    if (msg.type === 'complete') {
      statusEl.textContent = '✅ ' + msg.message;
      statusEl.className = 'status-area success';
      btnSync.disabled = false;
      select.disabled = false;
    }

    if (msg.type === 'error') {
      statusEl.textContent = '❌ ' + msg.message;
      statusEl.className = 'status-area error';
      btnSync.disabled = false;
      select.disabled = false;
    }
  };

  init();
</script>
</body>
</html>
