<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: var(--figma-color-text, #333);
    background: var(--figma-color-bg, #fff);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .header {
    background: #1a1a1a;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .logo { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .header .sep { color: #555; font-weight: 300; font-size: 18px; }
  .header .subtitle { font-size: 12px; color: #999; font-weight: 400; }

  .body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  label {
    font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--figma-color-text-secondary, #666);
  }

  select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--figma-color-border, #ddd);
    border-radius: 6px; font-size: 13px;
    background: var(--figma-color-bg, #fff);
    color: var(--figma-color-text, #333);
    cursor: pointer; outline: none;
  }
  select:focus { border-color: #2C66DD; }

  .product-card { display: none; border: 1px solid var(--figma-color-border, #e0e0e0); border-radius: 8px; overflow: hidden; }
  .product-card.visible { display: block; }
  .accent-bar { height: 6px; }
  .product-info { padding: 16px; }
  .product-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .product-desc { font-size: 12px; color: var(--figma-color-text-secondary, #888); margin-bottom: 12px; }

  .what-gets-created {
    background: var(--figma-color-bg-secondary, #f8f8f8);
    border-radius: 6px;
    padding: 12px;
  }
  .what-gets-created h4 {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--figma-color-text-secondary, #888);
    margin-bottom: 8px;
  }

  .section-group { margin-bottom: 10px; }
  .section-group-title {
    font-size: 11px; font-weight: 600;
    color: var(--figma-color-text-secondary, #888);
    margin-bottom: 4px;
  }
  .token-list {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .token-chip {
    background: var(--figma-color-bg, #fff);
    border: 1px solid var(--figma-color-border, #e0e0e0);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    display: flex; align-items: center; gap: 4px;
  }
  .token-chip .count {
    font-weight: 700;
    color: #2C66DD;
  }

  .pages-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px;
  }
  .page-chip {
    background: #EAF0FC;
    border: 1px solid #C0D1F5;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    color: #2C66DD;
    font-weight: 500;
  }

  .color-preview {
    display: flex; gap: 2px; margin-top: 12px;
    height: 24px; border-radius: 4px; overflow: hidden;
  }
  .color-preview .swatch { flex: 1; min-width: 0; }

  .status-area {
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-size: 12px;
    color: var(--figma-color-text-secondary, #888);
    padding: 0 20px;
  }
  .status-area.error { color: #CC3929; }
  .status-area.success { color: #0C8844; font-weight: 600; }

  .result-details { display: none; padding: 0 20px 8px; }
  .result-details.visible { display: block; }
  .result-row {
    display: flex; justify-content: space-between;
    padding: 3px 0; font-size: 12px;
    border-bottom: 1px solid var(--figma-color-border, #eee);
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .rlabel { color: var(--figma-color-text-secondary, #888); }
  .result-row .rvalue { font-weight: 600; }

  .footer {
    padding: 12px 20px;
    display: flex; gap: 10px;
  }
  button {
    flex: 1; padding: 10px 0;
    border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #2C66DD; color: #fff; }
  .btn-secondary {
    background: var(--figma-color-bg-secondary, #f0f0f0);
    color: var(--figma-color-text, #333);
    flex: 0 0 auto; padding: 10px 16px;
  }

  .vulcan-footer {
    text-align: center; padding: 6px 0 10px;
    color: #bbb; font-size: 11px; line-height: 1.6;
  }
  .vulcan-footer .emoji { font-size: 16px; }
</style>
</head>
<body>

  <div class="header">
    <span class="logo">Loom</span>
    <span class="sep">|</span>
    <span class="subtitle">Design Tokens</span>
  </div>

  <div class="body">
    <div>
      <label for="product-select">Choose Product</label>
      <select id="product-select">
        <option value="">Select a product…</option>
      </select>
    </div>

    <div class="product-card" id="product-card">
      <div class="accent-bar" id="accent-bar"></div>
      <div class="product-info">
        <div class="product-name" id="product-name"></div>
        <div class="product-desc" id="product-desc"></div>

        <div class="what-gets-created">
          <h4>What gets created</h4>

          <div class="section-group">
            <div class="section-group-title">Variable Collections</div>
            <div class="token-list" id="collections-list"></div>
          </div>

          <div class="section-group">
            <div class="section-group-title">Pages (Visual Reference)</div>
            <div class="pages-list">
              <span class="page-chip">Colors</span>
              <span class="page-chip">Semantics</span>
              <span class="page-chip">Typography</span>
              <span class="page-chip">Spacing</span>
            </div>
          </div>
        </div>

        <div class="color-preview" id="color-preview"></div>
      </div>
    </div>
  </div>

  <div class="status-area" id="status">Choose a product to begin</div>

  <div class="result-details" id="result-details">
    <div class="result-row"><span class="rlabel">Font</span><span class="rvalue" id="res-font"></span></div>
    <div class="result-row"><span class="rlabel">Spacing</span><span class="rvalue" id="res-spacing"></span></div>
    <div class="result-row"><span class="rlabel">Icon Size</span><span class="rvalue" id="res-icon"></span></div>
    <div class="result-row"><span class="rlabel">Stroke Width</span><span class="rvalue" id="res-stroke"></span></div>
    <div class="result-row"><span class="rlabel">Radius</span><span class="rvalue" id="res-radius"></span></div>
    <div class="result-row"><span class="rlabel">Pages</span><span class="rvalue" id="res-pages"></span></div>
    <div class="result-row"><span class="rlabel"><strong>Total Variables</strong></span><span class="rvalue" id="res-total"></span></div>
  </div>

  <div class="footer">
    <button class="btn-secondary" id="btn-cancel" onclick="parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*')">Close</button>
    <button class="btn-primary" id="btn-sync" disabled>Sync to Figma</button>
  </div>

  <div class="vulcan-footer">
    <span class="emoji">🖖</span><br>
    Live long and Prosper
  </div>

<script>
  const REPO_BASE = 'https://raw.githubusercontent.com/kamalakannan-raju-2916/loom-ds/main/tokens';

  let productsRegistry = null;
  let selectedProduct = null;
  let cachedColors = null;
  let cachedTypography = null;
  let cachedSpacing = null;
  let cachedRadii = null;
  let cachedSemantic = null;

  const select = document.getElementById('product-select');
  const card = document.getElementById('product-card');
  const btnSync = document.getElementById('btn-sync');
  const statusEl = document.getElementById('status');
  const resultDetails = document.getElementById('result-details');

  async function fetchJSON(path) {
    const url = `${REPO_BASE}/${path}`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
    return res.json();
  }

  // Resolve semantic token references to hex values
  function resolveRef(ref, colorsData) {
    // {primitive.color.grey.s90} → find colors.primitive.color.grey.s90.$value
    const match = ref.match(/\{primitive\.color\.(.+)\}/);
    if (!match) return ref;
    const path = match[1].split('.');
    let obj = colorsData.primitive.color;
    for (const p of path) {
      if (!obj) return '#888888';
      obj = obj[p];
    }
    if (obj && obj.$value) return obj.$value;
    if (typeof obj === 'string') return obj;
    return '#888888';
  }

  // Build flat list of semantic tokens with resolved light/dark values
  function buildSemanticTokens(semanticData, colorsData) {
    const tokens = [];
    if (!semanticData || !semanticData.semantic) return tokens;
    for (const [group, entries] of Object.entries(semanticData.semantic)) {
      for (const [name, modes] of Object.entries(entries)) {
        tokens.push({
          name: `${group}.${name}`,
          light: resolveRef(modes.Light, colorsData),
          dark: resolveRef(modes.Dark, colorsData)
        });
      }
    }
    return tokens;
  }

  // Count tokens per collection
  function countFontTokens(data) {
    const f = data.primitive.font;
    return Object.keys(f.family).length + Object.keys(f.weight).length +
           Object.keys(f.size).length + Object.keys(f.lineHeight).length +
           Object.keys(f.letterSpacing).length;
  }
  function countSpacingTokens(data) { return Object.keys(data.primitive.spacing).length; }
  function countIconTokens(data) { return Object.keys(data.primitive.iconSize).length; }
  function countStrokeTokens(data) { return Object.keys(data.primitive.strokeWidth).length; }
  function countRadiusTokens(data) { return Object.keys(data.primitive.radius).length; }

  function renderColorPreview(colorsData, accentFamily) {
    const preview = document.getElementById('color-preview');
    preview.innerHTML = '';
    const family = colorsData.primitive.color[accentFamily];
    if (!family) return;
    const keys = ['base','t10','t20','t30','t40','t50','t60','t70','t80','t90','t100'];
    keys.forEach(k => {
      if (!family[k]) return;
      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.background = family[k].$value;
      div.title = `${accentFamily}/${k}: ${family[k].$value}`;
      preview.appendChild(div);
    });
  }

  function renderCollectionChips() {
    const list = document.getElementById('collections-list');
    list.innerHTML = '';
    const collections = [
      { name: 'Font', count: countFontTokens(cachedTypography) },
      { name: 'Spacing', count: countSpacingTokens(cachedSpacing) },
      { name: 'Icon Size', count: countIconTokens(cachedSpacing) },
      { name: 'Stroke Width', count: countStrokeTokens(cachedSpacing) },
      { name: 'Radius', count: countRadiusTokens(cachedRadii) }
    ];
    collections.forEach(c => {
      const chip = document.createElement('span');
      chip.className = 'token-chip';
      chip.innerHTML = `${c.name} <span class="count">${c.count}</span>`;
      list.appendChild(chip);
    });
  }

  async function init() {
    try {
      statusEl.textContent = 'Loading product registry…';
      productsRegistry = await fetchJSON('products.json');

      for (const [key, prod] of Object.entries(productsRegistry.products)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = prod.name;
        select.appendChild(opt);
      }

      statusEl.textContent = 'Fetching tokens from GitHub…';
      const [colors, typo, spacing, radii, semantic] = await Promise.all([
        fetchJSON('primitive/colors.json'),
        fetchJSON('primitive/typography.json'),
        fetchJSON('primitive/spacing.json'),
        fetchJSON('primitive/radii.json'),
        fetchJSON('semantic/colors.json')
      ]);
      cachedColors = colors;
      cachedTypography = typo;
      cachedSpacing = spacing;
      cachedRadii = radii;
      cachedSemantic = semantic;

      statusEl.textContent = 'Choose a product to begin';
      statusEl.className = 'status-area';
    } catch (err) {
      statusEl.textContent = `Error: ${err.message}`;
      statusEl.className = 'status-area error';
    }
  }

  select.addEventListener('change', () => {
    const key = select.value;
    resultDetails.className = 'result-details';

    if (!key || !productsRegistry) {
      card.className = 'product-card';
      btnSync.disabled = true;
      selectedProduct = null;
      statusEl.textContent = 'Choose a product to begin';
      statusEl.className = 'status-area';
      return;
    }

    selectedProduct = { key, ...productsRegistry.products[key] };
    const accentFamily = cachedColors.primitive.color[selectedProduct.accent];
    const accentHex = (accentFamily && accentFamily.base && accentFamily.base.$value) || '#666';

    document.getElementById('accent-bar').style.background = accentHex;
    document.getElementById('product-name').textContent = selectedProduct.name;
    document.getElementById('product-desc').textContent = `${selectedProduct.description} · Accent: ${selectedProduct.accent}`;

    renderCollectionChips();
    renderColorPreview(cachedColors, selectedProduct.accent);

    const total = countFontTokens(cachedTypography) + countSpacingTokens(cachedSpacing) +
                  countIconTokens(cachedSpacing) + countStrokeTokens(cachedSpacing) +
                  countRadiusTokens(cachedRadii);

    card.className = 'product-card visible';
    btnSync.disabled = false;
    statusEl.textContent = `Ready to sync ${total} variables + 4 pages`;
    statusEl.className = 'status-area';
  });

  btnSync.addEventListener('click', () => {
    if (!selectedProduct || !cachedColors) return;

    btnSync.disabled = true;
    select.disabled = true;
    statusEl.textContent = 'Sending tokens to Figma…';
    statusEl.className = 'status-area';
    resultDetails.className = 'result-details';

    const semanticTokens = buildSemanticTokens(cachedSemantic, cachedColors);

    parent.postMessage({
      pluginMessage: {
        type: 'sync-tokens',
        productKey: selectedProduct.key,
        productConfig: selectedProduct,
        colorsData: cachedColors,
        typographyData: cachedTypography,
        spacingData: cachedSpacing,
        radiiData: cachedRadii,
        semanticTokens: semanticTokens
      }
    }, '*');
  });

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      statusEl.textContent = msg.message;
      statusEl.className = 'status-area';
    }

    if (msg.type === 'complete') {
      statusEl.textContent = `✅ ${msg.message}`;
      statusEl.className = 'status-area success';
      btnSync.disabled = false;
      select.disabled = false;

      if (msg.details) {
        document.getElementById('res-font').textContent = msg.details.font;
        document.getElementById('res-spacing').textContent = msg.details.spacing;
        document.getElementById('res-icon').textContent = msg.details.iconSize;
        document.getElementById('res-stroke').textContent = msg.details.strokeWidth;
        document.getElementById('res-radius').textContent = msg.details.radius;
        document.getElementById('res-pages').textContent = msg.details.pages;
        document.getElementById('res-total').textContent =
          msg.details.font + msg.details.spacing + msg.details.iconSize + msg.details.strokeWidth + msg.details.radius;
        resultDetails.className = 'result-details visible';
      }
    }

    if (msg.type === 'error') {
      statusEl.textContent = `❌ ${msg.message}`;
      statusEl.className = 'status-area error';
      btnSync.disabled = false;
      select.disabled = false;
    }
  };

  init();
</script>
</body>
</html>
